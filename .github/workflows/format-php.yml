name: Format PHP files

on:
  push:
    branches: [dev]
    paths:
      - '**/*.php'
  pull_request:
    branches: [dev]
    paths:
      - '**/*.php'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v3

      - name: Check PHP formatting
        run: ./vendor/bin/pint --test
