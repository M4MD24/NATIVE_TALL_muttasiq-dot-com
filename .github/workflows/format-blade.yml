name: Format Blade files

on:
  push:
    branches: [dev]
    paths:
      - 'resources/views/**/*.blade.php'
  pull_request:
    branches: [dev]
    paths:
      - 'resources/views/**/*.blade.php'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check Blade formatting
        run: npx blade-formatter --check-formatted --config .bladeformatterrc "resources/views/**/*.blade.php"
