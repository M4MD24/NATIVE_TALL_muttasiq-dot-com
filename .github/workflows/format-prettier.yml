name: Format CSS and JS files

on:
  push:
    branches: [dev]
    paths:
      - 'resources/css/**/*.css'
      - 'resources/js/**/*.js'
  pull_request:
    branches: [dev]
    paths:
      - 'resources/css/**/*.css'
      - 'resources/js/**/*.js'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npx prettier --check --config .prettierrc "resources/{css,js}/**/*.{css,js}"
